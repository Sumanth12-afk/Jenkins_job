name: Image Rebuild Scanner
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without triggering Jenkins or mutating state"
        type: boolean
        default: true
permissions:
  contents: read
  id-token: write
jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      JENKINS_URL: ${{ secrets.JENKINS_URL }}
      JENKINS_USER: ${{ secrets.JENKINS_USER }}
      JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
      JENKINS_WEBHOOK_URL: ${{ secrets.JENKINS_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Show repo structure
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python -m pytest -q
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Run scanner
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python -m src.core.scanner \
            --services-config config/services.yaml \
            --thresholds-config config/thresholds.yaml \
            --use-firestore \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
